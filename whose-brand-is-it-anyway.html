<head>

<title>Whose Brand Is It Anyway? — The 2025 Creative Salience Report · CreativeX</title>
<link rel="stylesheet" href="colors_and_type.css" />

  <!-- Resources referenced from JS/JSX (not plain HTML attributes). The standalone
       bundler populates window.__resources[id] with inlined blob URLs from the
       meta tags below; this initializer provides the original paths as a fallback
       so the un-bundled dev page keeps working too. -->
  <meta name="ext-resource-dependency" content="assets/logos/mondelez.png" data-resource-id="mondelezLogo" />
  <meta name="ext-resource-dependency" content="assets/logos/bayer.png" data-resource-id="bayerCaseLogo" />
  <meta name="ext-resource-dependency" content="assets/case-buttons/bayer-logo.png" data-resource-id="bayerBtnLogo" />
  <meta name="ext-resource-dependency" content="assets/logo/white-logo.svg" data-resource-id="whiteLogo" />

  <meta name="ext-resource-dependency" content="images/footer-2.png" data-resource-id="footer2" />
  <meta name="ext-resource-dependency" content="images/footer-3.png" data-resource-id="footer3" />
  <meta name="ext-resource-dependency" content="images/footer-4.png" data-resource-id="footer4" />
  <script>
    window.__resources = window.__resources || {};
    (function () {
      var fallbacks = {
        mondelezLogo: 'assets/logos/mondelez.png',
        bayerCaseLogo: 'assets/logos/bayer.png',
        bayerBtnLogo: 'assets/case-buttons/bayer-logo.png',

      for (var k in fallbacks) { if (!window.__resources[k]) window.__resources[k] = fallbacks[k]; }
    })();

<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--cx-paper);
    color: var(--cx-fg);
    font-family: var(--cx-font-sans);
    font-size: var(--cx-text-body);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow-x: clip;
  }
  img, svg { display: block; max-width: 100%; }
  button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; }
  a { color: inherit; text-decoration: none; }

  /* —————————————— LAYOUT —————————————— */
  .wrap { max-width: 1280px; margin: 0 auto; padding: 0 40px; }
  .wrap-wide { max-width: 1440px; margin: 0 auto; padding: 0 40px; }
  @media (max-width: 720px) { .wrap, .wrap-wide { padding: 0 24px; } }

  /* —————————————— NAV —————————————— */
  .nav {
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 40px;
    background: color-mix(in oklab, var(--cx-paper) 88%, transparent);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--cx-line);
  }
  .nav__brand { display: flex; align-items: center; gap: 10px; }
  .nav__brand img { height: 24px; }
  .nav__brand-divider { width: 1px; height: 18px; background: var(--cx-fg-faint); }
  .nav__report {
    font-family: var(--cx-font-sans); font-weight: 500;
    font-size: 13px; letter-spacing: 0.04em; text-transform: uppercase;
  }
  .nav__links { display: flex; gap: 28px; }
  .nav__links a { font-size: 14px; letter-spacing: 0.01em; color: var(--cx-fg-muted); transition: color .2s; }
  .nav__links a:hover { color: var(--cx-fg); }
  .nav__cta {
    padding: 11px 20px; border-radius: 10px;
    background: var(--cx-ocean); color: var(--cx-paper);
    font: 500 14px/1 var(--cx-font-sans); letter-spacing: .1px;
    transition: transform .2s, background .2s;
  }
  .nav__cta:hover { background: color-mix(in oklab, var(--cx-ocean) 86%, #000); transform: translateY(-1px); }
  .nav__toggle { display: none; }
  @media (max-width: 920px) {
    .nav__links {
      position: absolute; top: 100%; left: 0; right: 0;
      flex-direction: column; gap: 0;
      background: color-mix(in oklab, var(--cx-paper) 97%, transparent);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--cx-line);
      padding: 8px 24px 18px;
      display: none;
    }
    .nav__links.is-open { display: flex; }
    .nav__links a { padding: 14px 0; font-size: 16px; border-bottom: 1px solid var(--cx-line); }
    .nav__links a:last-child { border-bottom: 0; }
    .nav__toggle {
      display: inline-flex; flex-direction: column; justify-content: center; gap: 5px;
      width: 42px; height: 42px; padding: 0 9px; border-radius: 10px;
      border: 1px solid var(--cx-line); background: var(--cx-paper);
    }
    .nav__toggle span { display: block; height: 2px; width: 100%; background: var(--cx-ocean); border-radius: 2px; transition: transform .25s, opacity .2s; }
    .nav__toggle.is-open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .nav__toggle.is-open span:nth-child(2) { opacity: 0; }
    .nav__toggle.is-open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
  }

  /* —————————————— HERO —————————————— */
  .fold {
    min-height: calc(100svh - var(--nav-h, 87px));
    display: flex;
    flex-direction: column;
  }
  .fold .hero {
    flex: 1 0 auto;
    display: flex;
    align-items: center;
    padding: 48px 0;
  }
  .fold .ticker { flex: 0 0 auto; }
  .hero {
    position: relative; padding: 90px 0 120px;
    overflow: hidden;
    background: linear-gradient(to bottom, #b3d4ff 0%, #f4f3ed 100%);
  }
  .hero__eyebrow {
    display: inline-flex; align-items: center; gap: 10px;
    font-size: 13px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--cx-fg-muted);
    padding: 8px 14px; border-radius: 999px; border: 1px solid var(--cx-line);
    background: var(--cx-paper);
  }
  .hero__eyebrow-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--cx-coral); }
  .hero__title {
    margin: 28px auto 0;
    font-family: var(--cx-font-serif); font-weight: 500; font-style: italic;
    font-size: clamp(56px, 9vw, 144px);
    line-height: 0.92; letter-spacing: -0.03em;
    color: var(--cx-ocean);
    max-width: 16ch;
  }
  .hero__title .ampersand {
    font-family: var(--cx-font-serif); font-style: italic; color: var(--cx-coral);
  }
  .hero__sub {
    margin: 32px auto 0; max-width: 56ch;
    font-family: var(--cx-font-serif); font-weight: 400; font-style: normal;
    font-size: clamp(20px, 1.7vw, 26px); line-height: 1.35;
    color: var(--cx-fg-deep);
  }
  .hero__meta {
    margin-top: 56px;
    display: flex; flex-wrap: wrap; gap: 32px 56px;
    justify-content: center;
  }
  .hero__meta-item { display: flex; flex-direction: column; gap: 4px; }
  .hero__meta-label { font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--cx-fg-muted); }
  .hero__meta-value { font-size: 15px; font-weight: 500; color: var(--cx-fg); }

  .hero__cta {
    margin-top: 48px; display: flex; gap: 14px; flex-wrap: wrap;
    justify-content: center;
  }
  .btn {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 14px 25px; border-radius: 10px;
    font: 500 14px/1 var(--cx-font-sans); letter-spacing: .1px;
    transition: transform .2s, background .2s, color .2s, border-color .2s;
  }
  .btn--primary { background: var(--cx-ocean); color: var(--cx-paper); border: none; }
  .btn--primary:hover { background: color-mix(in oklab, var(--cx-ocean) 86%, #000); transform: translateY(-2px); }
  .btn--ghost { background: transparent; color: var(--cx-ocean); border: 1px solid var(--cx-ocean); padding: 13px 25px; }
  .btn--ghost:hover { background: var(--cx-ocean); color: var(--cx-paper); }
  .btn__arrow { width: 16px; height: 16px; transition: transform .2s; }
  .btn:hover .btn__arrow { transform: translateX(3px); }

  /* case-study buttons in hero */
  .hero__cta--cases { gap: 13px; align-items: stretch; flex-wrap: wrap; }
  .hero__cta--cases .case-btn { flex: 1 1 190px; max-width: 100%; }
  @media (max-width: 520px) {
    .hero__cta--cases .case-btn { flex: 1 1 100%; }
  }
  .case-btn {
    display: flex; align-items: center; gap: clamp(10px, 1.25vw, 15px);
    background: #eeeee4; border: 1px solid color-mix(in oklab, #003c4f 12%, transparent);
    border-radius: 11px; padding: 10px 17px 10px 10px;
    text-decoration: none; flex: 0 0 auto; max-width: 278px;
    transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease;
  }
  .case-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 18px rgba(0,60,79,.14); border-color: color-mix(in oklab, #003c4f 28%, transparent); }
  .case-btn__logo {
    flex: 0 0 auto; width: clamp(43px, 5.05vw, 56px); aspect-ratio: 1 / 1;
    background: #e0e0d4; border-radius: 7px;
    display: flex; align-items: center; justify-content: center; padding: 8px;
  }
  .case-btn__logo img { width: 100%; height: 100%; object-fit: contain; }
  .case-btn__body { display: flex; flex-direction: column; gap: 2px; text-align: left; flex: 1; }
  .case-btn__kicker {
    font: 500 10px/1 var(--cx-font-sans); letter-spacing: 0.1em; text-transform: uppercase;
    color: color-mix(in oklab, #003c4f 55%, transparent);
  }
  .case-btn__brand {
    font-family: var(--cx-font-serif); font-weight: 400; font-style: italic;
    font-size: clamp(17px, 1.87vw, 20px); letter-spacing: -0.02em; line-height: 1; color: #003c4f;
  }

  /* hero is centered, no decorative shapes */

  /* —————————————— MARQUEE / TICKER —————————————— */
  .ticker {
    background: var(--cx-ocean); color: var(--cx-paper);
    border-top: 1px solid rgba(255,255,255,.1);
    border-bottom: 1px solid rgba(255,255,255,.1);
    overflow: hidden;
    padding: 22px 0;
  }
  .ticker__track {
    display: flex; align-items: center; gap: 40px; white-space: nowrap;
    animation: marquee 50s linear infinite;
  }
  .ticker__item {
    display: inline-flex; align-items: baseline; gap: 14px;
    font-family: var(--cx-font-serif); font-style: italic; font-weight: 400;
    font-size: 36px;
  }
  .ticker__item-num { color: var(--cx-coral); font-style: normal; font-family: var(--cx-font-sans); font-weight: 500; letter-spacing: -0.02em; }
  .ticker__dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--cx-coral); align-self: center; }
  @keyframes marquee {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }

  /* —————————————— SECTION SCAFFOLD —————————————— */
  section { position: relative; }
  .sec { padding: 120px 0; }
  .sec--tight { padding: 80px 0; }
  .sec--sand { background: var(--cx-sand-200); }
  .sec--cream { background: var(--cx-card-cream); }
  .sec--ocean { background: var(--cx-ocean); color: var(--cx-paper); }
  .sec--ocean h2, .sec--ocean h3, .sec--ocean h4, .sec--ocean p, .sec--ocean .eyebrow { color: var(--cx-paper); }

  .eyebrow {
    display: inline-block;
    font-size: 12px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--cx-fg-muted);
    padding-bottom: 8px;
    border-bottom: 1px solid var(--cx-fg-faint);
  }
  .eyebrow--coral { color: var(--cx-coral); border-bottom-color: var(--cx-coral); }
  .eyebrow--paper { color: rgba(255,255,255,.7); border-bottom-color: rgba(255,255,255,.3); }

  .sec__title {
    font-family: var(--cx-font-sans); font-weight: 500; font-style: normal;
    font-size: clamp(40px, 5.4vw, 84px);
    line-height: 1.0; letter-spacing: -0.025em;
    margin: 24px 0 0;
    max-width: 18ch;
  }
  .sec__title em { font-style: normal; }
  .sec__title--sans {
    font-family: var(--cx-font-sans); font-weight: 500; font-style: normal;
    font-size: clamp(36px, 4.4vw, 64px); line-height: 1.02; letter-spacing: -0.025em;
  }
  .sec__lede {
    margin: 28px 0 0;
    font-family: var(--cx-font-serif); font-size: clamp(19px, 1.5vw, 24px); line-height: 1.45;
    color: var(--cx-fg-deep);
    max-width: 56ch;
  }
  .sec--ocean .sec__lede { color: rgba(255,255,255,.85); }

  .grid-2 { display: grid; grid-template-columns: 1.05fr 1fr; gap: 80px; align-items: start; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px; }
  @media (max-width: 980px) { .grid-2 { grid-template-columns: 1fr; gap: 48px; } .grid-3 { grid-template-columns: 1fr; } }

  /* —————————————— REUSABLE: stat card —————————————— */
  .stat {
    display: flex; flex-direction: column; gap: 10px;
    padding: 32px; border-radius: 24px;
    background: var(--cx-paper); border: 1px solid var(--cx-line);
    position: relative; overflow: hidden;
  }
  .stat__num {
    font-family: var(--cx-font-sans); font-weight: 500; letter-spacing: -0.04em;
    font-size: clamp(56px, 7vw, 110px); line-height: 0.95; color: var(--cx-ocean);
  }
  .stat__num .unit { font-size: 0.5em; color: var(--cx-coral); margin-left: 4px; vertical-align: 0.45em; font-weight: 500; }
  .stat__label { font-size: 16px; line-height: 1.4; color: var(--cx-fg-deep); max-width: 28ch; }
  .stat--coral { background: var(--cx-coral); }
  .stat--coral .stat__num, .stat--coral .stat__label { color: var(--cx-paper); }
  .stat--coral .stat__num .unit { color: var(--cx-ocean); }
  .stat--ocean { background: var(--cx-ocean); }
  .stat--ocean .stat__num, .stat--ocean .stat__label { color: var(--cx-paper); }
  .stat--ocean .stat__num .unit { color: var(--cx-coral); }

  /* —————————————— footer —————————————— */
  footer {
    background: #003C4F; color: var(--cx-paper);
    padding: 100px 0 0;
  }
  footer h3 { font-family: var(--cx-font-serif); font-style: italic; font-size: clamp(40px, 4.5vw, 64px); line-height: 1; margin: 0 0 24px; }
  footer .ft__grid { display: grid; grid-template-columns: 1.6fr 1fr 1fr; gap: 56px; padding-bottom: 60px; border-bottom: 1px solid rgba(255,255,255,.12); }
  @media (max-width: 720px) { footer .ft__grid { grid-template-columns: 1fr; gap: 40px; } }
  footer ul { list-style: none; padding: 0; margin: 0; }
  footer li { padding: 6px 0; font-size: 15px; color: rgba(255,255,255,.75); }
  footer li a:hover { color: var(--cx-coral); }
  footer .ft__col-title { font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; opacity: 0.5; margin-bottom: 12px; }
  footer .ft__bottom { display: flex; justify-content: space-between; padding-top: 32px; font-size: 13px; opacity: 0.5; flex-wrap: wrap; gap: 16px; }

  /* —— footer fan-of-cards —— */
  .fc { margin-top: 48px; overflow: hidden; }
  .fc__stage { position: relative; margin: 0 auto; transform-origin: top center; }
  .fc__card {
    position: absolute; left: 0; top: 0;
    transform-origin: 0 0; will-change: transform, opacity;
    border-radius: 8px; background: #fff;
    box-shadow: inset 0 0 0 1.5px #F5F0E3, 0 14px 40px rgba(0,0,0,.28);
    padding: 8px;
  }
  .fc__photo {
    position: relative; width: 100%; border-radius: 5px; overflow: hidden;
  }
  .fc__photo-label {
    position: absolute; left: 12px; top: 11px;
    font-family: var(--cx-font-mono); font-size: 12px; letter-spacing: .04em;
    color: rgba(255,255,255,.92); text-shadow: 0 1px 3px rgba(0,0,0,.35);
  }
  .fc__hero-card {
    background: var(--cx-card-cream);
    box-shadow: inset 0 0 0 1.6px #F5F0E3, 0 18px 50px rgba(0,0,0,.32);
    padding: 38px 46px;
  }
  .fc__hero-text {
    display: block; white-space: pre-wrap;
    font-family: var(--cx-font-sans); font-weight: 600;
    font-size: 63px; line-height: 1.06; letter-spacing: 1.4px;
    color: var(--cx-denim);
  }
  .fc__tag {
    position: absolute; left: 0; top: 0; transform-origin: 0 0;
    will-change: transform, opacity;
    background: #FBD8AE; color: #151127;
    font-family: var(--cx-font-sans); font-weight: 500; font-size: 13px; letter-spacing: .4px;
    padding: 7px 15px; border-radius: 999px; white-space: nowrap;
  }
  @media (prefers-reduced-motion: reduce) {
    .fc__card, .fc__tag { transition: none !important; }
  }

  /* small helpers */
  .pull { font-family: var(--cx-font-serif); font-style: italic; font-size: clamp(28px, 3vw, 44px); line-height: 1.15; color: var(--cx-fg); }
  .rule { height: 1px; background: var(--cx-line); margin: 0; }
  .center { text-align: center; }
  .reveal { opacity: 0; transform: translateY(20px); transition: opacity .9s ease, transform .9s ease; }
  .reveal.is-in { opacity: 1; transform: none; }

  /* —— scroll-reveal (applied by JS) —— */
  .js-reveal {
    opacity: 0; transform: translateY(26px);
    transition: opacity .75s cubic-bezier(.22,.61,.36,1), transform .75s cubic-bezier(.22,.61,.36,1);
  }
  .js-reveal.is-in { opacity: 1; transform: none; }
  @media (prefers-reduced-motion: reduce) {
    .js-reveal { opacity: 1 !important; transform: none !important; transition: none !important; }
  }

  /* glow */
  .glow {
    position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(60% 60% at 80% 30%, color-mix(in oklab, var(--cx-coral) 14%, transparent), transparent 70%);
  }

  /* —— headline spotlight: when the Problem-statement header + subheader reach
        screen-center, THIS section turns ocean (#003C4F) and the type goes paper
        (#f4f3ec). The group pins over a scroll buffer, so a second scroll exits. —— */
  #problem { transition: background-color .65s ease; }
  body.spotlight #problem { background-color: #003C4F !important; }

  /* The rest-at-center behaviour is handled in JS via GSAP ScrollTrigger snap
     (see ProblemStatement.jsx) so it eases in/out like the horizontal "3 ways"
     section, instead of the abrupt native CSS scroll-snap. */
  @media (max-width: 767px) {
    /* on phones the section is content-height, not a forced 100vh frame */
    #problem { min-height: 0 !important; display: block !important; padding: 72px 0 !important; }
  }

  .cs-spot { width: 100%; }
  .cs-spot, .cs-spot *, .cs-body, .cs-body * { transition: color .6s ease, border-color .6s ease; }
  body.spotlight .cs-spot,
  body.spotlight .cs-spot *,
  body.spotlight .cs-body,
  body.spotlight .cs-body * { color: #f4f3ec !important; }
  body.spotlight .cs-spot .eyebrow { border-color: #f4f3ec !important; }

  @media (prefers-reduced-motion: reduce) {
    #problem, .cs-spot, .cs-spot * { transition: none !important; }
  }
</style>
</head>
<body>
  <!-- Nav -->
  <nav class="nav">
    <div class="nav__brand">
      <img src="assets/logo/cxlogo-h-rgb.svg" alt="CreativeX" style="width: 86px; height: 31px" />
      <span class="nav__brand-divider" aria-hidden="true"></span>
      <span class="nav__report">INSIGHTS・CREATIVE SALIENCE</span>
    </div>
    <div class="nav__links" id="navLinks">
      <a href="#dbas">What's a DBA?</a>
      <a href="#gap">The Attribution Gap</a>
      <a href="#multiplier">The Multiplier Effect</a>
      <a href="#loaned">The Loaned Brand</a>
      <a href="#cases">Case Studies</a>
      <a href="#playbook">The Playbook</a>
    </div>
    <a href="#contact" class="nav__cta">Talk to us →</a>
    <button class="nav__toggle" id="navToggle" aria-label="Menu" aria-expanded="false" aria-controls="navLinks">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <script>
    (function () {
      var toggle = document.getElementById('navToggle');
      var links = document.getElementById('navLinks');
      if (!toggle || !links) return;
      function setOpen(open) {
        links.classList.toggle('is-open', open);
        toggle.classList.toggle('is-open', open);
        toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
      }
      toggle.addEventListener('click', function () {
        setOpen(!links.classList.contains('is-open'));
      });
      links.addEventListener('click', function (e) {
        if (e.target.tagName === 'A') setOpen(false);
      });

      var nav = document.querySelector('.nav');
      function syncNavH() {
        if (nav) document.documentElement.style.setProperty('--nav-h', nav.offsetHeight + 'px');
      }
      syncNavH();
      window.addEventListener('resize', syncNavH);
      window.addEventListener('load', syncNavH);
    })();
  </script>

  <!-- React mount -->
  <div id="root"></div>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Scroll-reveal: subtle fade + slide-up as elements enter the viewport -->
  <script>
    (function () {
      if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

      // Section-level elements that read well with a soft entrance.
      // (Interactive rows with their own inline transitions are intentionally excluded.)
      var SELECTORS = [
        '.hero__eyebrow', '.hero__title', '.hero__sub', '.hero__meta', '.hero__cta',
        'section .eyebrow', '.sec__title', '.sec__lede',
        '.stat', '.exec-grid > *',
        '.gap-grid > *', '.mult-grid > *', '.lb-grid',
        '.case-card', '.case-pullquote',
        '.closing-grid > div', '.cx-hsform',
        'footer .ft__grid > div'
      ].join(',');

      var delays = new WeakMap();

      var io = new IntersectionObserver(function (entries) {
        entries.forEach(function (e) {
          if (!e.isIntersecting) return;
          var el = e.target;
          var d = delays.get(el) || 0;
          setTimeout(function () { el.classList.add('is-in'); }, d);
          io.unobserve(el);
        });
      }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });

      function arm() {
        var els = Array.prototype.slice.call(document.querySelectorAll(SELECTORS))
          .filter(function (el) { return !el.closest('.hs'); });
        if (!els.length) return false;

        // Group siblings so grids/rows stagger gently.
        var groups = new Map();
        els.forEach(function (el) {
          if (el.classList.contains('js-reveal')) return;
          el.classList.add('js-reveal');
          var arr = groups.get(el.parentNode) || [];
          arr.push(el);
          groups.set(el.parentNode, arr);
        });
        groups.forEach(function (arr) {
          arr.forEach(function (el, i) { delays.set(el, Math.min(i * 70, 280)); });
        });

        els.forEach(function (el) { if (!el.dataset.revArmed) { el.dataset.revArmed = '1'; io.observe(el); } });
        return true;
      }

      // React mounts asynchronously after Babel transpiles — wait for #root to fill.
      var root = document.getElementById('root');
      if (!arm()) {
        var mo = new MutationObserver(function () {
          if (arm()) { /* keep observing for late sections, but stop after first fill settles */ }
        });
        mo.observe(root, { childList: true, subtree: true });
        // Stop the mutation watcher once things have settled.
        setTimeout(function () { mo.disconnect(); arm(); }, 4000);
      }
    })();
  </script>
